<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0F"/>
      <stop offset="100%" style="stop-color:#1A1A2E"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4FF"/>
      <stop offset="50%" style="stop-color:#B24BF3"/>
      <stop offset="100%" style="stop-color:#FF2D95"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="200" cy="100" r="200" fill="#00D4FF" opacity="0.06"/>
  <circle cx="1000" cy="500" r="250" fill="#B24BF3" opacity="0.06"/>
  <circle cx="600" cy="300" r="180" fill="#FF2D95" opacity="0.04"/>
  <text x="600" y="240" text-anchor="middle" font-family="Arial,sans-serif" font-weight="800" font-size="72" fill="url(#glow)">MyTalent.MyDream</text>
  <text x="600" y="330" text-anchor="middle" font-family="Arial,sans-serif" font-weight="400" font-size="32" fill="#8888A0">Everyone Has a Gift</text>
  <text x="600" y="420" text-anchor="middle" font-family="Arial,sans-serif" font-weight="400" font-size="24" fill="#55556A">We build free websites for talented people</text>
  <text x="600" y="460" text-anchor="middle" font-family="Arial,sans-serif" font-weight="400" font-size="24" fill="#55556A">who can't afford one. Support their dreams.</text>
  <rect x="440" y="500" width="320" height="50" rx="25" fill="url(#glow)" opacity="0.9"/>
  <text x="600" y="532" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="18" fill="#0A0A0F">Discover Talents & Donate</text>
</svg>
